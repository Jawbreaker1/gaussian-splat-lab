<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gaussian Splat Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Gaussian Splat Lab</h1>
          <div class="machine" id="machineLabel">RTX workstation</div>
        </div>
        <div class="status-strip" id="statusStrip" aria-label="Validation status"></div>
      </header>

      <main class="workspace">
        <section class="capture-panel panel" aria-labelledby="captureTitle">
          <div class="panel-head">
            <h2 id="captureTitle">Capture</h2>
            <button class="icon-button" id="refreshButton" title="Refresh" aria-label="Refresh">↻</button>
          </div>

          <label class="field">
            <span>Source</span>
            <select id="captureSelect"></select>
          </label>

          <div class="capture-meta" id="captureMeta"></div>

          <label class="field">
            <span>Video file</span>
            <input class="file-input" id="videoFileInput" type="file" accept="video/*" />
          </label>

          <label class="checkline" id="acceptCaptureWarningRow">
            <input id="acceptCaptureWarning" type="checkbox" />
            <span>Accept capture warning for technical validation</span>
          </label>

          <button class="secondary-action" id="importVideoButton">Import video</button>
          <div class="import-status muted" id="importStatus"></div>

          <button class="primary-action" id="planJobButton">Plan job</button>

          <div class="job-box" id="jobBox">
            <div class="muted">No active job</div>
          </div>
        </section>

        <section class="pipeline-panel panel" aria-labelledby="pipelineTitle">
          <div class="panel-head">
            <h2 id="pipelineTitle">Preflight & Pipeline</h2>
            <span class="pill neutral" id="gateCount">0 checks</span>
          </div>

          <div class="stage-section">
            <div class="stage-section-head">
              <h3>Preflight</h3>
              <span>Project readiness</span>
            </div>
            <div class="stage-list" id="preflightList"></div>
          </div>

          <div class="stage-section">
            <div class="stage-section-head">
              <h3>Media Pipeline</h3>
              <span>Video to splat</span>
            </div>
            <div class="stage-list" id="pipelineList"></div>
          </div>
        </section>

        <section class="panel preview-panel" aria-labelledby="previewTitle">
          <div class="panel-head">
            <h2 id="previewTitle">Artifact Inspect</h2>
            <span class="pill neutral" id="viewerStatusPill">pending</span>
          </div>
          <div class="viewer-controls" aria-label="Viewer controls">
            <div class="viewer-control-group" aria-label="Pan controls">
              <button class="icon-button" id="viewerPanLeftButton" title="Move left" aria-label="Move left">←</button>
              <button class="icon-button" id="viewerPanUpButton" title="Move up" aria-label="Move up">↑</button>
              <button class="icon-button" id="viewerPanDownButton" title="Move down" aria-label="Move down">↓</button>
              <button class="icon-button" id="viewerPanRightButton" title="Move right" aria-label="Move right">→</button>
            </div>
            <div class="viewer-control-group" aria-label="Orbit controls">
              <button class="icon-button" id="viewerOrbitLeftButton" title="Rotate left" aria-label="Rotate left">↶</button>
              <button class="icon-button" id="viewerOrbitUpButton" title="Rotate up" aria-label="Rotate up">⇧</button>
              <button class="icon-button" id="viewerOrbitDownButton" title="Rotate down" aria-label="Rotate down">⇩</button>
              <button class="icon-button" id="viewerOrbitRightButton" title="Rotate right" aria-label="Rotate right">↷</button>
            </div>
            <div class="viewer-control-group" aria-label="Zoom controls">
              <button class="icon-button" id="viewerResetButton" title="Reset view" aria-label="Reset view">⟲</button>
              <button class="icon-button" id="viewerZoomOutButton" title="Zoom out" aria-label="Zoom out">−</button>
              <button class="icon-button" id="viewerZoomInButton" title="Zoom in" aria-label="Zoom in">+</button>
            </div>
          </div>
          <canvas id="splatCanvas" width="960" height="640" aria-label="Gaussian splat inspection scene"></canvas>
          <div class="render-compare" id="renderCompare" hidden>
            <figure id="sampleRenderFigure">
              <div class="render-frame"><img id="sampleRenderImage" alt="gsplat rendered sample" /></div>
              <figcaption>Render</figcaption>
            </figure>
            <figure id="sampleTargetFigure">
              <div class="render-frame"><img id="sampleTargetImage" alt="training target frame" /></div>
              <figcaption>Target</figcaption>
            </figure>
          </div>
          <figure class="review-sheet" id="renderReviewFigure" hidden>
            <div class="review-frame"><img id="renderReviewImage" alt="multi-view render target diff review" /></div>
            <figcaption>Render review (gsplat)</figcaption>
          </figure>
          <div class="viewer-meta" id="viewerMeta"></div>
        </section>

        <section class="panel compliance-panel" aria-labelledby="complianceTitle">
          <div class="panel-head">
            <h2 id="complianceTitle">Compliance</h2>
            <span class="pill" id="blockedCount">0 blocked</span>
          </div>
          <div class="compliance-grid" id="complianceGrid"></div>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
